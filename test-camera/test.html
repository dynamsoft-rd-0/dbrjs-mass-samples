<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>Pls <span style="color:red">refresh</span> before each open, so no hardware camera cache.</p>
    <button id="btn-open-d3">open default with timeout 3s</button>
    <button id="btn-open-d10">open default with timeout 10s</button>
    <button id="btn-open-r10">open no resolution limit with timeout 10s</button>
    <button id="btn-open-c10">open no camera limit with timeout 10s</button>
    <button id="btn-open-a10">open no any limit with timeout 10s</button>
    <br>
    <script src="dm-camera.js?v=20250814.1"></script>
    <script>
        document.querySelector('#btn-open-d3').addEventListener('click', async function(){
            let camera = window.camera ??= new DMCamera.Camera();
            //camera.isMirrored = true;
            camera.ui = await fetch('./mobile-native.ui.xml?v=20250528').then(r=>r.text());
            camera.ui.style.height = '70vh';
            document.body.append(camera.ui);
            await camera.open();
            alert(this.textContent);
        });
        document.querySelector('#btn-open-d10').addEventListener('click', async function(){
            DMCamera.Camera._videoPlayTimeout = 10000;
            let camera = window.camera ??= new DMCamera.Camera();
            //camera.isMirrored = true;
            camera.ui = await fetch('./mobile-native.ui.xml?v=20250528').then(r=>r.text());
            camera.ui.style.height = '70vh';
            document.body.append(camera.ui);
            await camera.open();
            alert(this.textContent);
        });
        document.querySelector('#btn-open-r10').addEventListener('click', async function(){
            DMCamera.Camera._videoPlayTimeout = 10000;
            let camera = window.camera ??= new DMCamera.Camera();
            //camera.isMirrored = true;
            camera.ui = await fetch('./mobile-native.ui.xml?v=20250528').then(r=>r.text());
            camera.ui.style.height = '70vh';
            document.body.append(camera.ui);
            await camera.requestResolution(null);
            await camera.open();
            alert(this.textContent);
        });
        document.querySelector('#btn-open-c10').addEventListener('click', async function(){
            DMCamera.Camera._videoPlayTimeout = 10000;
            let camera = window.camera ??= new DMCamera.Camera();
            //camera.isMirrored = true;
            camera.ui = await fetch('./mobile-native.ui.xml?v=20250528').then(r=>r.text());
            camera.ui.style.height = '70vh';
            document.body.append(camera.ui);
            await camera.requestCamera(null);
            await camera.open();
            alert(this.textContent);
        });
        document.querySelector('#btn-open-a10').addEventListener('click', async function(){
            DMCamera.Camera._videoPlayTimeout = 10000;
            let camera = window.camera ??= new DMCamera.Camera();
            //camera.isMirrored = true;
            camera.ui = await fetch('./mobile-native.ui.xml?v=20250528').then(r=>r.text());
            camera.ui.style.height = '70vh';
            document.body.append(camera.ui);
            await camera.requestCamera(null);
            await camera.requestResolution(null);
            await camera.open();
            alert(this.textContent);
        });
    </script>
</body>
</html>
