<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>Pls <span style="color:red">refresh</span> before each open, so no hardware camera cache.</p>
    <button id="btn-open-d">open default, now in PC(win/mac) timeout should be 10s</button>
    <br>
    <script src="dm-camera.js?v=20250814.1"></script>
    <script>
        document.querySelector('#btn-open-d').addEventListener('click', async function(){
            let camera = window.camera ??= new DMCamera.Camera();
            console.log(`current timeout: ${DMCamera.Camera._videoPlayTimeout}`);
            camera.ui = await fetch('./mobile-native.ui.xml?v=20250528').then(r=>r.text());
            camera.ui.style.height = '70vh';
            document.body.append(camera.ui);
            await camera.open();
            alert(this.textContent);
        });
    </script>
</body>
</html>
