<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <meta name="description" content="Read barcodes from camera with Dynamsoft Barcode Reader in a PWA application." />
  <meta name="keywords" content="barcode, camera, PWA" />
  <title>Dynamsoft Barcode Reader PWA Sample - Hello World (Decode via Camera)</title>
  <link rel="canonical" href="https://demo.dynamsoft.com/Samples/DBR/JS/frameworks/pwa/scan-using-foundational-api/helloworld-pwa.html" />
  <link rel="manifest" href="./helloworld-pwa.json" />
  <meta name="theme-color" content="#B12A34" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="sample for ios" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="apple-touch-icon" sizes="192x192" href="./dynamsoft-192x192.png" />
  <link rel="apple-touch-icon" sizes="512x512" href="./dynamsoft-512x512.png" />
</head>

<body>
<p id="p-loading">loading resources</p>

<script src="./eruda.min.js"></script>
<script>
    // console tool
    eruda.init();
</script>
  
<!-- Include Dynamsoft Barcode Reader Bundle via CDN -->
<script src="https://cdn.jsdelivr.net/npm/dynamsoft-barcode-reader-bundle@11.2.4000/dist/dbr.bundle.js"></script>

<script type="module">
  // Notice: 
  // this version of Camera only works with dbrjs-11.4.2000's setInput
  // So I will use camera's basic API instead
  // I'll refer to https://github.com/Dynamsoft/easy-barcode-scanner/blob/main/src/index.ts
  import { CameraEnhancer } from "./dce-with-edit-view.esm.js?v=1775802497486";

  // easier to debug in console
  Object.assign(self, {
    CameraEnhancer,
  });

  /** LICENSE ALERT - README
   * To use the library, you need to first specify a license key using the API "initLicense()" as shown below.
   */

  Dynamsoft.License.LicenseManager.initLicense("DLS2eyJvcmdhbml6YXRpb25JRCI6IjIwMDAwMSJ9");

  /**
   * You can visit https://www.dynamsoft.com/customer/license/trialLicense?utm_source=samples&product=dbr&package=js to get your own trial license good for 30 days.
   * Note that if you downloaded this sample from Dynamsoft while logged in, the above license key may already be your own 30-day trial license.
   * For more information, see https://www.dynamsoft.com/barcode-reader/docs/web/programming/javascript/user-guide/index.html?ver=11.2.4000&cVer=true#specify-the-license&utm_source=samples or contact support@dynamsoft.com.
   * LICENSE ALERT - THE END
   */
  
  // Create a `CaptureVisionRouter` instance.
  const cvRouter = self.cvRouter = await Dynamsoft.CVR.CaptureVisionRouter.createInstance();

  CameraEnhancer.defaultUIElementURL = 'dce.ui.xml';//?v=' + Date.now();
  const camera = self.camera = await CameraEnhancer.createInstance();

  document.querySelector('#p-loading').remove();

  // put into html, so we can observe
  camera.ui.style.height = '60vh';
  document.body.append(camera.ui);

  await camera.open();

  if('disabled' === camera.singleFrameMode){
    // Video played successfully.
    while(true){
      if('opened' !== camera.status){
        await new Promise(r=>setTimeout(r, 1000));
        continue;
      }
      const captureResult = await cvRouter.capture(camera.getFrame(), 'ReadBarcodes_SpeedFirst');
      const items = captureResult.decodedBarcodesResult?.barcodeResultItems;
      if(items?.length){
        let arrTxt = [];
        for(let item of items){
          arrTxt.push(item.text);
        }
        await camera.close(); // in iOS, when alert, camera can't play
        alert(arrTxt.join('\n'));
        await camera.open();
      }
    }
  }else{
    // Failback to `singleFrameMode = 'camera'`.

    // in iOS PWA, wasm seems to be slow, need more time to warmup
    let warmupFinished = false;

    camera.on('singleFrameAcquired', async (frame) => {

      // The frame might too big and decoding will timeout
      // make it smaller
      if(frame.width > 2300 || frame.height > 2300){
        let newFrame = document.createElement('canvas');
        newFrame.width = frame.width / 2;
        newFrame.height = frame.height / 2;
        newFrame.getContext('2d').drawImage(frame.toCanvas(), 0, 0, newFrame.width, newFrame.height);
        frame = newFrame;
      }

      let items;

      if(warmupFinished){
        const captureResult = await cvRouter.capture(frame, 'ReadBarcodes_SpeedFirst');
        items = captureResult.decodedBarcodesResult?.barcodeResultItems;
      }else{
        // need warmup
        for(let i = 0; i < 3; i++){
          const captureResult = await cvRouter.capture(frame, 'ReadBarcodes_SpeedFirst');
          items = captureResult.decodedBarcodesResult?.barcodeResultItems;
          if(items?.length){ break; }
          camera.funcShowToast('warmup...');
          await new Promise(r => setTimeout(r, 1000));
        }
        warmupFinished = true;
      }


      if(items?.length){
        let arrTxt = [];
        for(let item of items){
          arrTxt.push(item.text);
        }
        alert(arrTxt.join('\n'));
      }else{
        alert('No barcode detected.');
      }
    });
  }



</script>

<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./service-worker.js");
  }
</script>
</body>

</html>
